  <!-- Firebase Modular SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-app.js";
    import {
      getFirestore,
      collection,
      getDocs,
      query,
      where,
      orderBy
    } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCYVrQQtwuKZ4EpbyokBR3OmgWoNtnsAtc",
      authDomain: "mayfairproperties-00.firebaseapp.com",
      projectId: "mayfairproperties-00",
      storageBucket: "mayfairproperties-00.appspot.com",
      messagingSenderId: "288069767491",
      appId: "1:288069767491:web:40bbb396d0d4a93a391ff6"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const params = new URLSearchParams(window.location.search);
    const listing = params.get("listing")?.toLowerCase();
    const offer = params.get("offer")?.toLowerCase();
    const city = params.get("city")?.toLowerCase();

    let filters = [];
    if (listing) filters.push(where("type", "==", listing));
    if (offer) filters.push(where("offer", "==", offer));
    if (city) filters.push(where("city", "==", city));

    let q = query(collection(db, "properties"), ...filters);

    const snapshot = await getDocs(q);
    const resultsDiv = document.getElementById("results");

    if (snapshot.empty) {
      resultsDiv.innerHTML = "<p style='color:white'>No matching properties found.</p>";
    }

    snapshot.forEach((doc) => {
      const data = doc.data();
      const card = document.createElement("div");
      card.className = "property-card";
      card.innerHTML = `
        <img src="${data.imageUrl}" alt="${data.title}" />
        <h4>${data.title}</h4>
        <p><strong>Type:</strong> ${data.type}</p>
        <p><strong>Offer:</strong> ${data.offer}</p>
        <p><strong>City:</strong> ${data.city}</p>
        <p><strong>Price:</strong> ${data.price}</p>
        <a class="view-btn" href="#">View Details</a>
      `;
      resultsDiv.appendChild(card);
    });
  </script>
