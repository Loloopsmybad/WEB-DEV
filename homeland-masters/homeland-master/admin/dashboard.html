<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mayfair Admin Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(145deg, #141e30, #243b55);
      color: white;
    }

    .dashboard-container {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 250px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      border-right: 1px solid rgba(255, 255, 255, 0.1);
      padding: 20px;
    }

    .sidebar h4 {
      font-weight: bold;
      margin-bottom: 30px;
    }

    .sidebar button {
      display: block;
      width: 100%;
      margin-bottom: 15px;
      background: rgba(255, 255, 255, 0.1);
      color: white;
      border: none;
      padding: 10px;
      border-radius: 8px;
      text-align: left;
      cursor: pointer;
    }

    .sidebar button:hover {
      background: rgba(140, 82, 255, 0.3);
    }

    #dashboardContent {
      flex: 1;
      padding: 30px;
    }

    .property-card {
      background: rgba(255, 255, 255, 0.199);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.125);
      padding: 20px;
      margin: 10px;
      width: 300px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
    }

    .property-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
    }

    @media (max-width: 768px) {
      .dashboard-container {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }

      #dashboardContent {
        padding: 20px;
      }
    }

    .delete-btn {
  background: rgba(255, 0, 0, 0.192);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 61, 61, 0.4);
  /* color: #ff3d3d; */
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.3s ease;
}

.delete-btn:hover {
  background: rgba(255, 61, 61, 0.4);
  border-color: transparent;
}

.glass-form {
  background: rgba(255, 255, 255, 0.1);
  padding: 25px;
  border-radius: 12px;
  backdrop-filter: blur(16px);
  border: 1px solid rgba(255, 255, 255, 0.2);
  max-width: 600px;
}

.dashboard-container {
  background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
              url('../images/131.png') no-repeat center center;
  background-size: cover;
  backdrop-filter: blur(4px);
}

#addPropertyBtn {
  background: linear-gradient(to right, #FF85C2, #312F3E);
  color: white;
  border: none;
  padding: 10px 20px;
  border-radius: 8px;
  font-weight: bold;
  box-shadow: 0 4px 10px rgba(0, 242, 254, 0.3);
  transition: all 0.3s ease;
}

#addPropertyBtn:hover {
  background: linear-gradient(to right, #312F3E, #FF85C2);
  box-shadow: 0 6px 15px rgba(0, 0, 0, 0.4);
  transform: scale(1.03);
}

#deletePropertiesBtn {
  background: linear-gradient(to right, #FF85C2, #312F3E);
  color: white;
  border: none;
  padding: 10px 20px;
  border-radius: 8px;
  font-weight: bold;
  box-shadow: 0 4px 10px rgba(0, 242, 254, 0.3);
  transition: all 0.3s ease;
}


#deletePropertiesBtn:hover {
  background: linear-gradient(to right, #312F3E, #FF85C2);
  box-shadow: 0 6px 15px rgba(0, 0, 0, 0.4);
  transform: scale(1.03);
}


#viewPropertiesBtn {
   background: linear-gradient(to right, #FF85C2, #312F3E);
  color: white;
  border: none;
  padding: 10px 20px;
  border-radius: 8px;
  font-weight: bold;
  box-shadow: 0 4px 10px rgba(0, 242, 254, 0.3);
  transition: all 0.3s ease;
}

#viewPropertiesBtn:hover {
   background: linear-gradient(to right, #312F3E, #FF85C2);
  box-shadow: 0 6px 15px rgba(0, 0, 0, 0.4);
  transform: scale(1.03);
}

.btn-primary {
  background: #312F3E;
  backdrop-filter: blur(10px);
  border: 1px solid #FF85C2;
  /* color: #ff3d3d; */
  padding: 8px 14px;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.3s ease;
}

.btn-primary:hover {
   background: #FF85C2;
  border-color: transparent;
}
  </style>
</head>
<body>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-app.js";
    import {
      getAuth,
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCYVrQQtwuKZ4EpbyokBR3OmgWoNtnsAtc",
      authDomain: "mayfairproperties-00.firebaseapp.com",
      projectId: "mayfairproperties-00",
      storageBucket: "mayfairproperties-00.appspot.com",
      messagingSenderId: "288069767491",
      appId: "1:288069767491:web:40bbb396d0d4a93a391ff6"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // ✅ Global logout function
    window.logoutAdmin = function () {
      signOut(auth).then(() => {
        window.location.href = "index.html";
      }).catch((error) => {
        console.error("Logout error:", error);
        alert("Logout failed");
      });
    };

    // 🔐 Redirect if not logged in
    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = "index.html";
      }
    });
  </script>
  <div class="dashboard-container">
    <div class="sidebar">
      <h4>Admin Panel</h4>
      <button id="deletePropertiesBtn">🗑️ Delete Property</button>
      <button id="addPropertyBtn">➕ Add Property</button>
      <button id="manageChatsBtn">🧑‍💬 Manage Chats</button>
      <!--button id="viewPropertiesBtn">👁️ View Properties</button -->
      <button href="#" onclick="logoutAdmin()">🔐Logout</button>
      <!-- You can add more buttons here -->
    </div>

    <div id="dashboardContent">
      <h3>Welcome to Mayfair Admin Dashboard</h3>
      <p>Click on options from the sidebar to get started.</p>
    </div>
  </div>

  <!-- JS -->
  <script type="module" src="../js/dashboard.js"></script>
  <script type="module" src="../js/admin-chat.js"></script>
</body>
</html>
